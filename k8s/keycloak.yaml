apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: alzheimer
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30081 # You can access Keycloak on your VM_IP:30081
  selector:
    app: keycloak
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: alzheimer
spec:
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak:24.0.2
        args: ["start-dev", "--import-realm"]
        env:
        - name: KEYCLOAK_ADMIN
          value: "admin"
        - name: KEYCLOAK_ADMIN_PASSWORD
          value: "admin"
        - name: KC_HOSTNAME_STRICT
          value: "false"
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: realm-config
          mountPath: /opt/keycloak/data/import
      volumes:
      - name: realm-config
        configMap:
          name: keycloak-realm
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: alzheimer
data:
  alzheimer-realm.json: |
    {
      "realm": "alzheimer-realm",
      "enabled": true,
      "users": [
        {
          "username": "admin",
          "enabled": true,
          "credentials": [{"type": "password", "value": "admin"}]
        }
      ]
    }
    # Note: I put a placeholder here. You should replace this with the 
    # actual content of your alzheimer-realm.json file later!
