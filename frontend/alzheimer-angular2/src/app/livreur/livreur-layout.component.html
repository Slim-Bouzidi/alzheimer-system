<div class="livreur-layout">
  <app-sidebar role="LIVREUR" [userName]="livreurName" userRole="Service Livraison"></app-sidebar>
  <div class="livreur-main">
    <header class="topbar">
      <div class="search-container">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search patient" class="search-input" />
      </div>

      <div class="topbar-actions">
        <button class="icon-btn" type="button" title="Notifications">
          <span>🔔</span>
          <span class="badge-dot"></span>
        </button>
        <button class="icon-btn" type="button" title="Calendar">
          <span>📅</span>
        </button>
        <button class="btn-logout" type="button" (click)="logout()">
          <span>Logout</span>
          <span>🚪</span>
        </button>
      </div>
    </header>

    <main class="content-area">
      <router-outlet></router-outlet>
    </main>

    <button class="chatbot-fab" type="button" (click)="toggleChatbot()" aria-label="Ouvrir chatbot">
      <span>Bot</span>
    </button>

    <section class="chatbot-panel" *ngIf="chatbotOpen">
      <header class="chatbot-header">
        <h3>Assistant Livreur</h3>
        <button type="button" class="close-btn" (click)="toggleChatbot()">x</button>
      </header>

      <div class="chatbot-messages">
        <article
          class="chat-message"
          *ngFor="let msg of messages"
          [class.user]="msg.from === 'user'"
          [class.bot]="msg.from === 'bot'"
        >
          <p>{{ msg.text }}</p>
        </article>

        <p class="status" *ngIf="isLoading">Analyse en cours...</p>
        <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
      </div>

      <div class="question-list">
        <p class="question-title">Questions predefinies</p>
        <button
          type="button"
          class="question-btn"
          *ngFor="let question of questions"
          [disabled]="isLoading"
          (click)="askPredefinedQuestion(question)"
        >
          {{ question.label }}
        </button>
      </div>
    </section>
  </div>
</div>
