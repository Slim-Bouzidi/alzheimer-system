<header class="topbar-page">
  <h1>{{ 'SOIGNANT_REMINDERS.MEALS_TITLE' | translate }}</h1>
  <button class="btn-outline" (click)="logout()">Déconnexion</button>
</header>
<main class="content-area">
  <section class="card">
    <div class="card-header">
      <h2>{{ 'SOIGNANT_REMINDERS.MEALS_CONFIGURED' | translate }}</h2>
    </div>
    <div class="list-simple">
      <div *ngFor="let r of rappels" class="list-item">
        Repas {{ r.heure }} · {{ r.regimeAlimentaire || '—' }} · {{ r.patientNom }}
      </div>
    </div>
    <p *ngIf="rappels.length === 0" class="empty-msg">{{ 'SOIGNANT_REMINDERS.NO_MEAL_REMINDER' | translate }}</p>
  </section>
</main>
