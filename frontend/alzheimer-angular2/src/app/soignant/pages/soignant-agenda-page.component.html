<div class="agenda-page">
  <header class="agenda-header">
    <div class="agenda-title">
      <h1>{{ 'SOIGNANT_AGENDA.TITLE' | translate }}</h1>
      <p class="subtitle">{{ 'SOIGNANT_AGENDA.SUBTITLE' | translate }}</p>
    </div>

    <div class="agenda-controls">
      <div class="view-switcher">
        <button [class.active]="currentView === 'week'" (click)="switchView('week')">{{ 'SOIGNANT_AGENDA.WEEK' | translate }}</button>
        <button [class.active]="currentView === 'day'" (click)="switchView('day')">{{ 'SOIGNANT_AGENDA.DAY' | translate }}</button>
      </div>

      <div class="nav-controls">
        <button (click)="previous()">‹</button>
        <span class="current-period">{{ currentPeriodLabel }}</span>
        <button (click)="next()">›</button>
      </div>
    </div>
  </header>

  <!-- Patient Selector Bar -->
  <div class="patient-selector-bar">
    <button class="patient-chip" [class.active]="agendaFilterPatientId === null" (click)="filterByPatient(null)">
      🌟 {{ 'SOIGNANT_AGENDA.ALL_PATIENTS' | translate }}
    </button>
    <button *ngFor="let p of patients" class="patient-chip" [class.active]="agendaFilterPatientId === p.id"
      (click)="filterByPatient(p.id)">
      <span class="patient-avatar">{{ p.prenom[0] }}{{ p.nom[0] }}</span>
      {{ p.prenom }} {{ p.nom }}
    </button>
  </div>

  <!-- New 60/40 Layout -->
  <div class="agenda-layout">
    <!-- Agenda Section (60%) -->
    <section class="agenda-section">
      <app-agenda-weekly-view *ngIf="currentView === 'week'" [events]="events" [weekStart]="currentDate"
        [selectedEventId]="selectedEventId" (statusChange)="onStatusChange($event)" (eventClick)="onEventClick($event)">
      </app-agenda-weekly-view>

      <app-agenda-daily-view *ngIf="currentView === 'day'" [events]="events" [selectedEventId]="selectedEventId"
        (statusChange)="onStatusChange($event)" (eventClick)="onEventClick($event)">
      </app-agenda-daily-view>
    </section>

    <!-- Patient Panel (40%) -->
    <aside class="patient-panel" [class.open]="isPanelOpen">
      <app-patient-tracking-panel *ngIf="selectedPatientId" [patientId]="selectedPatientId" [currentDate]="currentDate"
        (closePanel)="closePanelDrawer()">
      </app-patient-tracking-panel>
    </aside>
  </div>
</div>
