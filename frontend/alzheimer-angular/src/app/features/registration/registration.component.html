<div class="split-view">
  <!-- Left Side: Custom Registration Form -->
  <main class="form-section">
    <div class="form-container">
      <header class="form-header">
        <div class="logo-box">
          <i class="pi pi-heart-fill"></i>
        </div>
        <h1>Create Account</h1>
        <p>Join the secure monitoring network for specialized care.</p>
      </header>

      <form [formGroup]="registrationForm" (ngSubmit)="onSubmit()" class="login-form">
        
        <p-message 
          *ngIf="errorMessage" 
          severity="error" 
          [text]="errorMessage"
          styleClass="mb-4 w-full">
        </p-message>

        <div class="input-row">
          <div class="field">
            <label for="firstName">First Name</label>
            <input 
              pInputText 
              id="firstName" 
              formControlName="firstName"
              placeholder="John"
              class="w-full custom-input"
              [class.ng-invalid]="isFieldInvalid('firstName')" />
          </div>
          <div class="field">
            <label for="lastName">Last Name</label>
            <input 
              pInputText 
              id="lastName" 
              formControlName="lastName"
              placeholder="Doe"
              class="w-full custom-input"
              [class.ng-invalid]="isFieldInvalid('lastName')" />
          </div>
        </div>

        <div class="field">
          <label for="email">Email Address</label>
          <input 
            pInputText 
            id="email" 
            formControlName="email" 
            type="email"
            placeholder="john@example.com"
            class="w-full custom-input"
            [class.ng-invalid]="isFieldInvalid('email')" />
        </div>

        <div class="field">
          <label for="role">User Role</label>
          <p-dropdown 
            id="role" 
            formControlName="role"
            [options]="roleOptions"
            placeholder="Select your role"
            optionLabel="label"
            optionValue="value"
            styleClass="w-full custom-dropdown"
            [class.ng-invalid]="isFieldInvalid('role')">
          </p-dropdown>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <p-password 
            id="password" 
            formControlName="password"
            placeholder="••••••••"
            [toggleMask]="true"
            [feedback]="false"
            styleClass="w-full"
            inputStyleClass="w-full custom-input"
            [class.ng-invalid]="isFieldInvalid('password')">
          </p-password>
        </div>

        <button type="submit" class="btn-primary-full" [disabled]="isSubmitting">
          <i class="pi pi-user-plus mr-2" *ngIf="!isSubmitting"></i>
          {{ isSubmitting ? 'Processing...' : 'Register Account' }}
        </button>

        <footer class="form-footer">
          <p>Already have an account? <a routerLink="/login">Sign In</a></p>
        </footer>
      </form>
    </div>
    <div class="footer-legal">
      &copy; 2026 Alzheimer Support. Precision care infrastructure.
    </div>
  </main>

  <!-- Right Side: Immersive Promo (Exact copy from Keycloak) -->
  <aside class="promo-section">
    <div class="promo-content">
      <h2 class="promo-title">
        Enter the <span class="italic">Future</span> <br/>
        of Patient <br/>
        <span class="highlight">Safety, today.</span>
      </h2>
      
      <div class="glass-hud">
        <div class="hud-item">
          <div class="hud-icon"><i class="pi pi-check-circle"></i></div>
          <div class="hud-data">
            <span class="val">2,481</span>
            <span class="lbl">Monitoring Active</span>
          </div>
        </div>
        <div class="hud-divider"></div>
        <div class="hud-item">
          <div class="hud-icon"><i class="pi pi-shield"></i></div>
          <div class="hud-data">
            <span class="val">Secure</span>
            <span class="lbl">End-to-End Vault</span>
          </div>
        </div>
        <div class="hud-divider"></div>
        <div class="hud-item emergency">
          <div class="hud-icon"><i class="pi pi-bolt"></i></div>
          <div class="hud-data">
            <span class="val">Real-time</span>
            <span class="lbl">Global Alerting</span>
          </div>
        </div>
      </div>
    </div>
    <div class="promo-bg-layers">
      <div class="gradient-layer"></div>
      <div class="texture-layer"></div>
    </div>
  </aside>
</div>
