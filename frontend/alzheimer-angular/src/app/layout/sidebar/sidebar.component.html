<nav class="sidebar">
  <!-- Header: brand when expanded; collapsed = rail toggle only (ChatGPT-style) -->
  <div class="sidebar-header">
    @if (!collapsed()) {
    <div class="brand">
      <div class="logo-box">
        <span class="logo-letter">C</span>
      </div>
      <div class="brand-text">
        <span class="brand-name">CareConnect</span>
        <span class="brand-subtitle">Alzheimer's Admin</span>
      </div>
    </div>
    }
    <button type="button" class="toggle-btn" (click)="onToggleSidebar($event)"
      [attr.aria-label]="collapsed() ? 'Open sidebar' : 'Close sidebar'" [attr.aria-expanded]="!collapsed()"
      [attr.title]="collapsed() ? 'Open sidebar' : 'Close sidebar'">
      <!-- Lucide PanelLeft / PanelLeftClose icon -->
      @if (collapsed()) {
      <svg class="toggle-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect width="18" height="18" x="3" y="3" rx="2" />
        <path d="M9 3v18" />
      </svg>
      } @else {
      <svg class="toggle-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect width="18" height="18" x="3" y="3" rx="2" />
        <path d="M9 3v18" />
        <path d="m16 15-3-3 3-3" />
      </svg>
      }
    </button>
  </div>

  <!-- Navigation -->
  <div class="nav-content">
    <ul class="nav-list">
      @for (item of navItems(); track item.route) {
      <li class="nav-item">
        <a class="nav-link" [routerLink]="item.route" routerLinkActive="nav-link--active"
          [routerLinkActiveOptions]="{ exact: !!item.exact }" [attr.aria-label]="item.label"
          [attr.title]="collapsed() ? item.label : null">
          <i [class]="item.icon + ' nav-icon'" aria-hidden="true"></i>
          @if (!collapsed()) {
          <span class="nav-label">{{ item.label }}</span>
          }
        </a>
      </li>
      }
    </ul>
  </div>

  <!-- Footer: User profile -->
  <div class="sidebar-footer">
    <div class="user-profile">
      <div class="profile-avatar-wrap" [attr.title]="collapsed() ? 'Dr. Sarah Chen — Super Admin' : null">
        <p-avatar image="https://randomuser.me/api/portraits/women/44.jpg" shape="circle" size="large"
          styleClass="profile-avatar" />
      </div>
      @if (!collapsed()) {
      <div class="user-info">
        <span class="user-name">Dr. Sarah Chen</span>
        <span class="user-role">Super Admin</span>
      </div>
      }
      <button type="button" class="profile-menu-btn" [class.profile-menu-btn--collapsed]="collapsed()"
        (click)="profileMenu.toggle($event)" aria-label="Profile menu">
        <i class="pi pi-ellipsis-v"></i>
      </button>
      <p-menu #profileMenu [model]="profileMenuItems" [popup]="true" appendTo="body" />
    </div>
  </div>
</nav>
