spring.application.name=api-gateway
server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Gateway routes
spring.cloud.gateway.routes[0].id=patient-service
spring.cloud.gateway.routes[0].uri=lb://patient-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/patients/me, /api/patients/me/**, /api/clinical-records/**

spring.cloud.gateway.routes[1].id=cognitive-service
spring.cloud.gateway.routes[1].uri=lb://cognitive-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/cognitive-activities, /api/cognitive-activities/**
spring.cloud.gateway.routes[1].filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

spring.cloud.gateway.routes[2].id=assistance-quotidienne
spring.cloud.gateway.routes[2].uri=lb://assistance-quotidienne
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/patients, /api/patients/**, /api/fiches/**, /api/rapports/**, /api/rapports-hebdo/**, /api/notifications/**, /api/agenda/**, /api/traitements/**, /api/rendez-vous/**, /api/treatment/**, /api/medicalRecord/**, /api/emergencyContact/**, /api/users/**
spring.cloud.gateway.routes[2].filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# WebSocket route (SockJS)
spring.cloud.gateway.routes[3].id=assistance-quotidienne-ws
spring.cloud.gateway.routes[3].uri=lb:ws://assistance-quotidienne
spring.cloud.gateway.routes[3].predicates[0]=Path=/ws/**

# Global filter to deduplicate CORS on all routes
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# Keycloak JWT validation
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/alzheimer-realm