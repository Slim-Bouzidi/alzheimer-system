spring.application.name=api-gateway
server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=api-gateway

# Gateway routes
spring.cloud.gateway.routes[0].id=patient-service
spring.cloud.gateway.routes[0].uri=lb://patient-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/patients/**, /api/clinical-records/**

spring.cloud.gateway.routes[1].id=cognitive-service
spring.cloud.gateway.routes[1].uri=http://cognitive-service:8083
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/cognitive-activities, /api/cognitive-activities/**, /api/cognitive/analysis/**
spring.cloud.gateway.routes[1].filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

spring.cloud.gateway.routes[2].id=user-service
spring.cloud.gateway.routes[2].uri=lb://user-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[3].id=AlzheimerApp
spring.cloud.gateway.routes[3].uri=lb://ALZHEIMERAPP
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/articles/**, /api/comments/**, /api/patient/**, /api/treatment/**, /api/emergencyContact/**, /api/medicalRecord/**

# Global filter to deduplicate CORS on all routes
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# Keycloak JWT validation
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8080/realms/alzheimer-realm/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8080/realms/alzheimer-realm/protocol/openid-connect/certs