spring.application.name=api-gateway
server.port=8080

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost

# Gateway routes
spring.cloud.gateway.routes[0].id=patient-service
spring.cloud.gateway.routes[0].uri=lb://patient-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/patients/**, /api/clinical-records/**

spring.cloud.gateway.routes[1].id=cognitive-service
spring.cloud.gateway.routes[1].uri=lb://cognitive-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/cognitive-activities, /api/cognitive-activities/**
spring.cloud.gateway.routes[1].filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

spring.cloud.gateway.routes[2].id=user-service
spring.cloud.gateway.routes[2].uri=lb://user-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/users/**

spring.cloud.gateway.routes[3].id=AlzheimerApp
spring.cloud.gateway.routes[3].uri=lb://ALZHEIMERAPP
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/alerts/**, /api/missions/**, /api/members/**, /api/availability/**, /api/skills/**, /api/notifications/**, /api/reports/**, /api/dispatch/**, /api/engine/**, /api/network/**, /api/dashboard/**, /api/support-patients/**

# Route for gestion-patient (medical management)
spring.cloud.gateway.routes[4].id=gestion-patient
spring.cloud.gateway.routes[4].uri=lb://gestion-patient
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/patient/**, /api/treatment/**, /api/medicalRecord/**, /api/emergencyContact/**, /api/articles/**, /api/comments/**

# Route for gestion-livreur (logistics/delivery management)
spring.cloud.gateway.routes[5].id=gestion-livreur
spring.cloud.gateway.routes[5].uri=lb://gestion-livreur
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/delivery-patients/**, /api/staff-profiles/**, /api/shifts/**, /api/routes/**, /api/route-stops/**, /api/assignments/**, /api/delivery-tasks/**, /api/meal-slots/**, /api/locations/**, /api/livreur-chatbot/**

# Global filter to deduplicate CORS on all routes
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# Keycloak JWT validation
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/alzheimer-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/realms/alzheimer-realm/protocol/openid-connect/certs