spring.application.name=user-service
server.port=8084

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/userdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Keycloak JWT Validation
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/alzheimer-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/realms/alzheimer-realm/protocol/openid-connect/certs

# Keycloak Admin API
keycloak.admin.server-url=http://localhost:8081
keycloak.admin.realm=alzheimer-realm
keycloak.admin.client-id=admin-cli
keycloak.admin.client-secret=${KEYCLOAK_ADMIN_SECRET:}
keycloak.admin.username=admin
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:admin}

# Patient Service URL
patient.service.url=http://localhost:8082

# Logging
logging.level.com.alzheimer.userservice=DEBUG
logging.level.org.springframework.security=DEBUG
