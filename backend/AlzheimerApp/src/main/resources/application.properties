spring.application.name=ALZHEIMERAPP
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_patients?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
server.port=8085

# Eureka configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=localhost

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Brevo transactional email (HTTP API)
brevo.api.key=${BREVO_API_KEY:${SENDINBLUE_API_KEY:}}
brevo.api.url=https://api.brevo.com/v3/smtp/email
brevo.sender.email=${BREVO_SENDER_EMAIL:}
brevo.sender.name=${BREVO_SENDER_NAME:Support Network}
brevo.http.connect-timeout-ms=5000
brevo.http.read-timeout-ms=10000
brevo.reply-to.enabled=true
brevo.reply-to.email=
brevo.reply-to.name=

# Support-network mission email flow
support.network.mail.send-on-mission-assigned=true
support.network.mail.send-on-alert-triggered=true
support.network.mail.send-on-final-escalation=true
support.network.mail.admin-email=
support.network.mission-email-accept-base-url=http://localhost:${server.port}
support.network.mission-email-action-token-ttl-minutes=30

# Allow optional local overrides (ignored by git)
spring.config.import=optional:classpath:application-local.properties
